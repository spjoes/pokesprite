version: '3'

includes:
  os: ./Taskfile_{{OS}}.yml

tasks:
  default:
    desc: Run the standard set of commands to generate new outputs.
    cmds:
      - task: scale
      - task: trim
      - task: spritesheet:png
      - task: scss

  build:
    desc: Build spritesheet and generate SCSS, CSS, and TypeScript position files.
    cmds:
      - task: trim
      - task: spritesheet:png
      - task: scss
      - task: css
      - task: positions

  rename:
    desc: Rename msikma/pokesprite icons to the names that we expect them to be in.
    cmds:
      - go run cmd/rename/main.go

  chop:
    desc: Chop up an existing spritesheet into separate images.
    cmds:
      - go run cmd/chop/main.go {{.CLI_ARGS}}

  scale:
    desc: Scale any images greater than 100px in any dimension by 0.5.
    cmds:
      - go run cmd/scale/main.go {{.CLI_ARGS}}

  trim:
    desc: Trim all excess transparency off the images.
    cmds:
      - go run cmd/trim/main.go

  spritesheet:
    desc: Generate a PNG spritesheet (default task for backwards compatibility).
    deps: [output]
    cmds:
      - task: spritesheet:png

  spritesheet:png:
    desc: Generate a PNG spritesheet using the images in the images directory.
    deps: [output]
    cmds:
      - go run cmd/spritesheet/main.go -format png
      - cmd: optipng -o7 output/pokesprite.png
        platforms: [linux, darwin]
        if: command -v optipng >/dev/null 2>&1
      - cmd: optipng -o7 output/pokesprite.png
        platforms: [windows]
        if: powershell -NoProfile -Command "Get-Command optipng -ErrorAction SilentlyContinue | Out-Null"

  spritesheet:webp:
    desc: Generate a WebP spritesheet using the images in the images directory.
    deps: [output]
    cmds:
      - go run cmd/spritesheet/main.go -format webp

  scss:
    desc: Generate a .scss file for the generated spritesheet using the filenames of the source images.
    deps: [output]
    cmds:
      - go run cmd/scss/main.go

  css:
    desc: Generate a plain .css file with sprite position rules (includes --w/--h custom properties for CSS-only scaling).
    deps: [output]
    cmds:
      - go run cmd/css/main.go

  positions:
    desc: Generate a TypeScript sprite-positions file from the SCSS file.
    deps: [output]
    cmds:
      - go run cmd/positions/main.go {{.CLI_ARGS}}

  # Helper tasks

  clean:
    desc: Deletes the output directory.
    cmds:
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force output"
        platforms: [windows]
        if: powershell -NoProfile -Command "if (Test-Path output) { exit 0 } else { exit 1 }"
      - cmd: rm -rf output
        platforms: [linux, darwin]
        if: test -d output

  output:
    desc: Ensures that the output directory exists.
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force output | Out-Null"
        platforms: [windows]
        if: powershell -NoProfile -Command "if (Test-Path output) { exit 1 } else { exit 0 }"
      - cmd: mkdir -p output
        platforms: [linux, darwin]
        if: test ! -d output

  setup:
    desc: Install necessary dependencies.
    cmds:
      - task: os:setup
